version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/main.go
    binary: mycli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/somaz94/template-go-cli/cmd/cli.Version={{.Version}}
      - -X github.com/somaz94/template-go-cli/cmd/cli.GitCommit={{.Commit}}
      - -X github.com/somaz94/template-go-cli/cmd/cli.BuildDate={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  groups:
    - title: "Features"
      regexp: '^feat'
      order: 0
    - title: "Bug Fixes"
      regexp: '^fix'
      order: 1
    - title: "Performance"
      regexp: '^perf'
      order: 2
    - title: "Refactoring"
      regexp: '^refactor'
      order: 3
    - title: "Build"
      regexp: '^build'
      order: 4
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - '^docs: update changelog'
      - '^docs: update CONTRIBUTORS'
      - '^Merge'
      - '^Auto commit'

release:
  github:
    owner: somaz94
    name: template-go-cli
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: somaz94
      name: homebrew-tap
    homepage: "https://github.com/somaz94/template-go-cli"
    description: "A brief description of your CLI tool"
    license: "Apache-2.0"
    install: |
      bin.install "mycli"
    test: |
      system "#{bin}/mycli", "version"
    caveats: |
      mycli installed!

      Quick start:
        mycli greet          # Print a greeting
        mycli version        # Show version info
        mycli --help         # Full usage

      Docs: https://github.com/somaz94/template-go-cli

scoops:
  - repository:
      owner: somaz94
      name: scoop-bucket
    homepage: "https://github.com/somaz94/template-go-cli"
    description: "A brief description of your CLI tool"
    license: "Apache-2.0"
